name: llm-projekt

services:
  db:
    image: postgres:16-alpine
    container_name: llm-projekt-db
    environment:
      POSTGRES_DB: questify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d questify']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: llm-projekt-backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/questify
      CORS_ORIGINS: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8000:8000'

  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /api
    container_name: llm-projekt-frontend
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  postgres_data: